services:
  
  boss:
    image: buzzobuono/waluigi-boss:latest
    ports:
    - target: 8082
      published: 8082
      protocol: tcp
      mode: ingress
    environment:
      - WALUIGI_BOSS_DB_PATH=/db/waluigi.db
    volumes:
      - ./db:/db
    deploy:
      replicas: 1

  worker:
    image: buzzobuono/waluigi-worker:latest
    depends_on:
      - boss
    environment:
      - WALUIGI_WORKER_BOSS_URL=http://boss:8082
      - WALUIGI_WORKER_WORKDIR=/work
      - WALUIGI_WORKER_SLOTS=1
    volumes:
      - ./work:/work
      - ./source:/source
    deploy:
      replicas: 1