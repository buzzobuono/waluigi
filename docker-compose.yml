services:

  boss:
    image: buzzobuono/waluigi:latest
    command: wlboss
    ports:
    - target: 8082
      published: 8082
      protocol: tcp
      mode: ingress
    environment:
      - WALUIGI_BOSS_DB_URL=sqlite:////db/waluigi.db
    volumes:
      - ./db:/db
    deploy:
      replicas: 3

  worker:
    image: buzzobuono/waluigi:latest
    command: wlworker
    depends_on:
      - boss
    environment:
      - WALUIGI_WORKER_BOSS_URL=http://boss:8082
      - WALUIGI_WORKER_WORKDIR=/work
      - WALUIGI_WORKER_SLOTS=1
      - WALUIGI_WORKER_AFFINITY=python
      - WALUIGI_CATALOG_URL=http://catalog:9000
    volumes:
      - ./data:/data
    deploy:
      replicas: 15

  catalog:
    image: buzzobuono/waluigi:latest
    command: wlcatalog
    ports:
    - target: 9000
      published: 9000
      protocol: tcp
      mode: ingress
    environment:
      - WALUIGI_CATALOG_DB_URL=sqlite:////db/catalog.db
      - WALUIGI_CATALOG_DATA_PATH=/data
    volumes:
      - ./db:/db
      - ./data:/data
    deploy:
      replicas: 1

  console:
    image: buzzobuono/waluigi:latest
    command: wlconsole
    depends_on:
      - boss
      - catalog
    ports:
    - target: 8080
      published: 8080
      protocol: tcp
      mode: ingress
    environment:
      - WALUIGI_CONSOLE_BOSS_URL=http://boss:8082
      - WALUIGI_CONSOLE_CATALOG_URL=http://catalog:9000
      - WALUIGI_CONSOLE_DB_URL=sqlite:////db/console.db
    volumes:
      - ./db:/db
    deploy:
      replicas: 1
