services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: waluigi
      POSTGRES_USER: waluigi
      POSTGRES_PASSWORD: ${WALUIGI_PG_PASSWORD:?WALUIGI_PG_PASSWORD must be set}
    volumes:
      - waluigi_pgdata:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waluigi -d waluigi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  boss:
    image: buzzobuono/waluigi:latest
    command: wlboss
    ports:
      - target: 8082
        published: 8082
        protocol: tcp
        mode: ingress
    environment:
      - WALUIGI_BOSS_DB_URL=postgresql+psycopg2://waluigi:${WALUIGI_PG_PASSWORD:?WALUIGI_PG_PASSWORD must be set}@postgres/waluigi
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10

  worker:
    image: buzzobuono/waluigi:latest
    command: wlworker
    environment:
      - WALUIGI_WORKER_BOSS_URL=http://boss:8082
      - WALUIGI_WORKER_WORKDIR=/work
      - WALUIGI_WORKER_SLOTS=1
      - WALUIGI_WORKER_AFFINITY=python
      - WALUIGI_CATALOG_URL=http://catalog:9000
    volumes:
      - ./data:/data
    deploy:
      replicas: 15

  catalog:
    image: buzzobuono/waluigi:latest
    command: wlcatalog
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: ingress
    environment:
      - WALUIGI_CATALOG_DB_URL=postgresql+psycopg2://waluigi:${WALUIGI_PG_PASSWORD:?WALUIGI_PG_PASSWORD must be set}@postgres/waluigi
      - WALUIGI_CATALOG_DATA_PATH=/data
    volumes:
      - ./data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10

  console:
    image: buzzobuono/waluigi:latest
    command: wlconsole
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress
    environment:
      - WALUIGI_CONSOLE_BOSS_URL=http://boss:8082
      - WALUIGI_CONSOLE_CATALOG_URL=http://catalog:9000
      - WALUIGI_CONSOLE_DB_URL=postgresql+psycopg2://waluigi:${WALUIGI_PG_PASSWORD:?WALUIGI_PG_PASSWORD must be set}@postgres/waluigi
    deploy:
      replicas: 1

volumes:
  waluigi_pgdata:
