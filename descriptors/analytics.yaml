        params:
          source: "SOCIAL"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.0"
        resources:
          pdc: 1
        affinity:
          - python
        requires:
          - name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_social"
            script: *extract_script
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python