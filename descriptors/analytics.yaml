kind: Job
metadata:
    workdir: "/work"
spec:
    name: "GlobalReport"
    id: "final_report"
    namespace: "analytics"
    script: |
        import pandas as pd
        from waluigi.sdk.task import Task
        from waluigi.sdk.catalog import catalog
        from waluigi.catalog.models import DatasetCreateRequest, DatasetFormat, SourceCreateRequest, SourceType

        task = Task()
        date = task.params.date

        catalog.create_source(SourceCreateRequest(
            id="analytics-local", type=SourceType.LOCAL, config={},
            description="Local storage for analytics pipeline",
        ))

        sources = ["erp", "web", "social"]
        frames, lineage = [], []
        for source in sources:
            reader = catalog.resolve(f"analytics/{source}/clean/clean_{source}")
            df = reader.read()
            df["pipeline_source"] = source
            frames.append(df)
            lineage.append({"dataset_id": reader.dataset_id, "version": reader.version})
            print(f"  {source}: {len(df)} rows @ {reader.version}")

        report_df = pd.concat(frames, ignore_index=True)
        dataset = DatasetCreateRequest(
            id="analytics/reports/global_report",
            format=DatasetFormat.PARQUET,
            description="Global consolidated report across all sources",
            source_id="analytics-local",
        )
        with catalog.produce(dataset, metadata={"date": date}, inputs=lineage) as w:
            w.write(report_df)
        print(f"Done: {w.dataset_id} @ {w.version}" if not w.skipped else f"Skipped: {w.version}")
    params:
      date: "2026-03-22"
    resources:
      coin: 1
    affinity:
      - python
    requires:

      - &clean_task
        name: "CleanDataTask"
        namespace: "analytics"
        id: "clean_erp"
        script: &clean_script |
            import random
            import pandas as pd
            from waluigi.sdk.task import Task
            from waluigi.sdk.catalog import catalog
            from waluigi.catalog.models import DatasetCreateRequest, DatasetFormat, SourceCreateRequest, SourceType

            task      = Task()
            source    = task.params.source.lower()
            date      = task.params.date
            fail_prob = float(task.attributes.fail_prob)

            if random.random() < fail_prob:
                raise RuntimeError(f"Simulated failure: {source}")

            catalog.create_source(SourceCreateRequest(
                id="analytics-local", type=SourceType.LOCAL, config={},
                description="Local storage for analytics pipeline",
            ))

            reader = catalog.resolve(f"analytics/{source}/raw/raw_{source}")
            df = reader.read().dropna()
            df["metric"] = df["metric"].str.strip().str.lower()
            df["value"]  = df["value"].astype(float)
            print(f"Cleaned: {len(df)} rows")

            dataset = DatasetCreateRequest(
                id=f"analytics/{source}/clean/clean_{source}",
                format=DatasetFormat.PARQUET,
                description=f"Cleaned data for {source}",
                source_id="analytics-local",
            )
            with catalog.produce(dataset,
                                 metadata={"date": date, "source": source},
                                 inputs=[{"dataset_id": reader.dataset_id, "version": reader.version}]) as w:
                w.write(df)
            print(f"Done: {w.dataset_id} @ {w.version}" if not w.skipped else f"Skipped: {w.version}")
        params:
          source: "ERP"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.0"
        resources:
          pdc: 1
        affinity:
          - python
        requires:
          - &extract_task
            name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_erp"
            script: &extract_script |
                import random
                import pandas as pd
                from waluigi.sdk.task import Task
                from waluigi.sdk.catalog import catalog
                from waluigi.catalog.models import DatasetCreateRequest, DatasetFormat, SourceCreateRequest, SourceType

                METRICS = {
                    "erp":    [("revenue","finance"),("costs","finance"),
                               ("orders","operations"),("refunds","finance")],
                    "web":    [("sessions","traffic"),("pageviews","traffic"),
                               ("conversions","acquisition"),("bounce_rate","engagement")],
                    "social": [("followers","audience"),("impressions","reach"),
                               ("engagements","interaction"),("shares","viral")],
                }

                task   = Task()
                source = task.params.source.lower()
                date   = task.params.date

                catalog.create_source(SourceCreateRequest(
                    id="analytics-local", type=SourceType.LOCAL, config={},
                    description="Local storage for analytics pipeline",
                ))

                rows = [{"date": date, "source": source, "metric": m,
                         "value": round(random.uniform(100, 10_000), 2), "category": c}
                        for m, c in METRICS[source]]

                dataset = DatasetCreateRequest(
                    id=f"analytics/{source}/raw/raw_{source}",
                    format=DatasetFormat.PARQUET,
                    description=f"Raw extracted data for {source}",
                    source_id="analytics-local",
                )
                with catalog.produce(dataset, metadata={"date": date, "source": source}) as w:
                    w.write(pd.DataFrame(rows))
                print(f"Done: {w.dataset_id} @ {w.version}" if not w.skipped else f"Skipped: {w.version}")
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python

      - <<: *clean_task
        id: "clean_web"
        script: *clean_script
        params:
          source: "WEB"
          date: "${parent.params.date}"
        requires:
          - <<: *extract_task
            id: "extract_web"
            script: *extract_script
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"

      - <<: *clean_task
        id: "clean_social"
        script: *clean_script
        params:
          source: "SOCIAL"
          date: "${parent.params.date}"
        requires:
          - <<: *extract_task
            id: "extract_social"
            script: *extract_script
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
