x-config:
    local_source: &local_source
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for the analytics pipeline"
        config:
            base_path: "data"

    report_expectations: &report_expectations
        - rule_id:   "expect_column_values_to_not_be_null"
          inputs:    {x: "this.metric"}
          tolerance: 1.0
        - rule_id:   "expect_column_values_to_not_be_null"
          inputs:    {x: "this.value"}
          tolerance: 1.0
        - rule_id:   "expect_column_values_to_be_between"
          inputs:    {x: "this.value"}
          params:    {min_val: 0, max_val: 1000000}
          tolerance: 1.0
        - rule_id:   "expect_column_values_to_be_of_type"
          inputs:    {x: "this.value"}
          params:    {target_type: "float"}
          tolerance: 1.0

    report_charts: &report_charts
        - key:   "value_by_source"
          title: "Total value by source"
          spec:
              type: "bar"
              x:   {field: "pipeline_source", label: "Source"}
              y:   {field: "value", agg: "sum", label: "Total Value"}
        - key:   "value_by_metric"
          title: "Value by metric"
          spec:
              type: "bar"
              x:   {field: "metric", label: "Metric"}
              y:   {field: "value", agg: "sum", label: "Total Value"}
        - key:   "value_share_by_source"
          title: "Value share by source"
          spec:
              type: "pie"
              x:   {field: "pipeline_source"}
              y:   {field: "value", agg: "sum"}
        - key:   "value_distribution"
          title: "Value distribution"
          spec:
              type: "histogram"
              x:   {field: "value", label: "Value"}
              bins: 10
        - key:   "value_by_category"
          title: "Value by category"
          spec:
              type: "bar"
              x:   {field: "category", label: "Category"}
              y:   {field: "value", agg: "sum", label: "Total Value"}

    report_schema: &report_schema
        - name:         "date"
          logical_type: "date"
          description:  "Reference date of the report"
          nullable:     false
          pii:          false
        - name:         "source"
          logical_type: "string"
          description:  "Origin system (erp, web, social)"
          nullable:     false
          pii:          false
        - name:         "pipeline_source"
          logical_type: "string"
          description:  "Pipeline source label injected at merge time"
          nullable:     false
          pii:          false
        - name:         "metric"
          logical_type: "string"
          description:  "Metric name"
          nullable:     false
          pii:          false
        - name:         "value"
          logical_type: "float"
          description:  "Metric numeric value"
          nullable:     false
          pii:          false
        - name:         "category"
          logical_type: "string"
          description:  "Metric category (finance, traffic, audience, …)"
          nullable:     true
          pii:          false


kind: DAG
metadata:
    workdir: "work"
spec:
    name: "DefineReportSchema"
    id:   "catalog_setup_define_schema"
    namespace: "catalog"
    type: "CatalogDefineSchema"
    config:
        dataset: "analytics/reports/global_report"
        publish: true
        columns: *report_schema
    resources:
        coin: 1
    affinity:
        - python
    requires:
        - name: "SetReportCharts"
          id:   "catalog_setup_set_charts"
          namespace: "catalog"
          type: "CatalogSetCharts"
          config:
              dataset: "analytics/reports/global_report"
              charts:  *report_charts
          resources:
              coin: 1
          affinity:
              - python
          requires:
              - name: "SetReportExpectations"
                id:   "catalog_setup_set_expectations"
                namespace: "catalog"
                type: "CatalogSetExpectations"
                config:
                    dataset:      "analytics/reports/global_report"
                    expectations: *report_expectations
                resources:
                    coin: 1
                affinity:
                    - python
                requires:
                    - name: "CreateReportDataset"
                      id:   "catalog_setup_create_dataset"
                      namespace: "catalog"
                      type: "CatalogCreateDataset"
                      config:
                          dataset:     "analytics/reports/global_report"
                          source_id:   "analytics-local"
                          format:      "parquet"
                          description: "Global consolidated report across all sources"
                      resources:
                          coin: 1
                      affinity:
                          - python
                      requires:
                          - name: "CreateAnalyticsSource"
                            id:   "catalog_setup_create_source"
                            namespace: "catalog"
                            type: "CatalogCreateSource"
                            config: *local_source
                            resources:
                                coin: 1
                            affinity:
                                - python
