x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: Job
metadata:
    name: "test_filter"
    namespace: "analytics"
spec:
    params:
        date: "2026-05-15"
    jobSpec:
        tasks:
            - id: "test_filter"
              taskRef:
                  name: "FilterDataset"
              config:
                  input:
                      dataset: "analytics/erp/clean/clean_erp"
                      source:  *local
                  output:
                      dataset:     "analytics/erp/filtered/high_value"
                      format:      "parquet"
                      description: "ERP metrics with value > 1000"
                      source:      *local
                  where: "value > 1000"
              resources:
                  coin: 1
              affinity:
                  - python
