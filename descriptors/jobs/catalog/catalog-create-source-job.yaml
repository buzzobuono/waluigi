kind: Job
metadata:
    workdir: "work"
    name: "catalog-create-source-job"
    namespace: "catalog"
spec:
    tasks:
        - id: "catalog-create-source-task"
          taskRef:
              name: "CatalogCreateSource"
          config:
              id: "test-local"
              type: "LOCAL"
              description: "Local storage for the test dataset"
              config:
                  data_path: "data"
          resources:
              coin: 1
          affinity:
              - python
