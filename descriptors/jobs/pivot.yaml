x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: Job
metadata:
    name: "test_pivot"
    namespace: "analytics"
spec:
    params:
        date: "2026-05-15"
    jobSpec:
        tasks:
            - id: "test_pivot"
              taskRef:
                  name: "PivotDataset"
              config:
                  input:
                      dataset: "analytics/erp/clean/clean_erp"
                      source:  *local
                  output:
                      dataset:     "analytics/erp/pivot/metrics_by_category"
                      format:      "parquet"
                      description: "ERP metrics pivoted — rows=category, cols=metric"
                      source:      *local
                  index:   "category"
                  columns: "metric"
                  values:  "value"
                  aggfunc: "sum"
              resources:
                  coin: 1
              affinity:
                  - python
