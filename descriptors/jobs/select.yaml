x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: Job
metadata:
    name: "test_select"
    namespace: "analytics"
spec:
    params:
        date: "2026-05-15"
    jobSpec:
        tasks:
            - id: "test_select"
              taskRef:
                  name: "SelectColumns"
              config:
                  input:
                      dataset: "analytics/erp/clean/clean_erp"
                      source:  *local
                  output:
                      dataset:     "analytics/erp/projected/metric_value"
                      format:      "parquet"
                      description: "ERP — metric, value, category only"
                      source:      *local
                  columns: ["metric", "value", "category"]
              resources:
                  coin: 1
              affinity:
                  - python
