x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: Job
metadata:
    name: "merge_all_sources"
    namespace: "analytics"
spec:
    params:
        date: "2026-05-15"
    jobSpec:
        tasks:
            - id: "merge_all_sources"
              taskRef:
                  name: "MergeDatasets"
              config:
                  inputs:
                      - dataset: "analytics/erp/clean/clean_erp"
                        label:   "erp"
                        source:  *local
                      - dataset: "analytics/web/clean/clean_web"
                        label:   "web"
                        source:  *local
                      - dataset: "analytics/social/clean/clean_social"
                        label:   "social"
                        source:  *local
                  output:
                      dataset:     "analytics/merged/all_sources"
                      format:      "parquet"
                      description: "Merge verticale di ERP, WEB e SOCIAL"
                      source:      *local
              resources:
                  coin: 1
              affinity:
                  - python
