x-sources:
    local: &local
        id:          "simulation-local"
        type:        "LOCAL"
        description: "Local storage for simulation pipeline"

kind: Pipeline
metadata:
    workdir: "work"
params:
    date: "2026-05-15"

spec:

    # ── PHASE 1: EXTRACTION (4 parallel) ────────────────────────────────────
    # Custom scripts generate simulated source data with no dependencies.

    - id:        "gen_sales"
      namespace: "simulation"
      script: |
        import pandas as pd, numpy as np
        from waluigi.tasks._io import write_output
        rng = np.random.default_rng(2026)
        n = 500
        dates = pd.date_range('2026-01-01', periods=365).astype(str).tolist()
        df = pd.DataFrame({
            'id':          range(1, n + 1),
            'date':        rng.choice(dates, n).tolist(),
            'product_id':  rng.integers(1, 31, n),
            'customer_id': rng.integers(1, 101, n),
            'region_id':   rng.integers(1, 9, n),
            'quantity':    rng.integers(1, 100, n),
            'unit_price':  rng.uniform(10.0, 1000.0, n).round(2),
            'discount':    rng.uniform(0.0, 0.35, n).round(3),
        })
        write_output(df, [])
      config:
          output:
              dataset:     "simulation/raw/sales"
              format:      "parquet"
              description: "500 simulated sales transactions"
              source:      *local
      resources:
          coin: 1

    - id:        "gen_products"
      namespace: "simulation"
      script: |
        import pandas as pd, numpy as np
        from waluigi.tasks._io import write_output
        rng = np.random.default_rng(2026)
        n = 30
        cats = ['Electronics', 'Clothing', 'Food', 'Software', 'Hardware']
        df = pd.DataFrame({
            'product_id': range(1, n + 1),
            'name':       [f'Product_{i:02d}' for i in range(1, n + 1)],
            'category':   rng.choice(cats, n).tolist(),
            'cost':       rng.uniform(5.0, 500.0, n).round(2),
        })
        write_output(df, [])
      config:
          output:
              dataset:     "simulation/raw/products"
              format:      "parquet"
              description: "30 simulated products with category and cost"
              source:      *local
      resources:
          coin: 1

    - id:        "gen_customers"
      namespace: "simulation"
      script: |
        import pandas as pd, numpy as np
        from waluigi.tasks._io import write_output
        rng = np.random.default_rng(2026)
        n = 100
        segs = ['Enterprise', 'SMB', 'Consumer', 'Prospect']
        df = pd.DataFrame({
            'customer_id': range(1, n + 1),
            'name':        [f'Customer_{i:03d}' for i in range(1, n + 1)],
            'segment':     rng.choice(segs, n).tolist(),
            'region_id':   rng.integers(1, 9, n),
        })
        write_output(df, [])
      config:
          output:
              dataset:     "simulation/raw/customers"
              format:      "parquet"
              description: "100 simulated customers with segment and region"
              source:      *local
      resources:
          coin: 1

    - id:        "gen_regions"
      namespace: "simulation"
      script: |
        import pandas as pd
        from waluigi.tasks._io import write_output
        df = pd.DataFrame({
            'region_id': range(1, 9),
            'name':    ['North','South','East','West','Central','Northeast','Southeast','Northwest'],
            'country': ['IT'] * 8,
            'zone':    ['Nord','Sud','Est','Ovest','Centro','Nord','Sud','Nord'],
        })
        write_output(df, [])
      config:
          output:
              dataset:     "simulation/raw/regions"
              format:      "parquet"
              description: "8 geographic regions with zone and country"
              source:      *local
      resources:
          coin: 1

    # ── PHASE 2: CLEANING (4 parallel) ──────────────────────────────────────
    # SelectColumns normalizes each source: drops columns that would create
    # naming conflicts in subsequent joins (e.g. region_id in customers, name in regions).

    - id:        "select_sales"
      namespace: "simulation"
      type:      "SelectColumns"
      requires:  ["gen_sales"]
      config:
          input:
              dataset: "simulation/raw/sales"
              source:  *local
          output:
              dataset:     "simulation/clean/sales"
              format:      "parquet"
              description: "Sales — typed and normalized"
              source:      *local
          columns: ["id", "date", "product_id", "customer_id", "region_id",
                    "quantity", "unit_price", "discount"]
      resources:
          coin: 1

    - id:        "select_products"
      namespace: "simulation"
      type:      "SelectColumns"
      requires:  ["gen_products"]
      config:
          input:
              dataset: "simulation/raw/products"
              source:  *local
          output:
              dataset:     "simulation/clean/products"
              format:      "parquet"
              description: "Products — id, category, cost only"
              source:      *local
          columns: ["product_id", "category", "cost"]
      resources:
          coin: 1

    - id:        "select_customers"
      namespace: "simulation"
      type:      "SelectColumns"
      requires:  ["gen_customers"]
      config:
          input:
              dataset: "simulation/raw/customers"
              source:  *local
          output:
              dataset:     "simulation/clean/customers"
              format:      "parquet"
              description: "Customers — id, name, segment (region_id dropped to avoid join conflict)"
              source:      *local
          columns: ["customer_id", "name", "segment"]
      resources:
          coin: 1

    - id:        "select_regions"
      namespace: "simulation"
      type:      "SelectColumns"
      requires:  ["gen_regions"]
      config:
          input:
              dataset: "simulation/raw/regions"
              source:  *local
          output:
              dataset:     "simulation/clean/regions"
              format:      "parquet"
              description: "Regions — id, zone, country (name dropped to avoid join conflict)"
              source:      *local
          columns: ["region_id", "zone", "country"]
      resources:
          coin: 1

    # ── PHASE 3: JOINING (sequential enrichment) ────────────────────────────
    # Each join adds a dimension to the sales fact table.

    - id:        "join_sales_products"
      namespace: "simulation"
      type:      "JoinDatasets"
      requires:  ["select_sales", "select_products"]
      config:
          left:
              dataset: "simulation/clean/sales"
              source:  *local
          right:
              dataset: "simulation/clean/products"
              source:  *local
          join:
              columns: ["product_id"]
              how:     "left"
          output:
              dataset:     "simulation/joined/sales_products"
              format:      "parquet"
              description: "Sales rows enriched with product category and cost"
              source:      *local
      resources:
          coin: 1

    - id:        "join_with_customers"
      namespace: "simulation"
      type:      "JoinDatasets"
      requires:  ["join_sales_products", "select_customers"]
      config:
          left:
              dataset: "simulation/joined/sales_products"
              source:  *local
          right:
              dataset: "simulation/clean/customers"
              source:  *local
          join:
              columns: ["customer_id"]
              how:     "left"
          output:
              dataset:     "simulation/joined/with_customers"
              format:      "parquet"
              description: "Sales enriched with customer name and segment"
              source:      *local
      resources:
          coin: 1

    - id:        "join_with_regions"
      namespace: "simulation"
      type:      "JoinDatasets"
      requires:  ["join_with_customers", "select_regions"]
      config:
          left:
              dataset: "simulation/joined/with_customers"
              source:  *local
          right:
              dataset: "simulation/clean/regions"
              source:  *local
          join:
              columns: ["region_id"]
              how:     "left"
          output:
              dataset:     "simulation/joined/full"
              format:      "parquet"
              description: "Fully enriched sales: products + customers + geography"
              source:      *local
      resources:
          coin: 1

    # ── PHASE 4: FINANCIAL DERIVATION ───────────────────────────────────────
    # Columns are sequential: gross_profit references revenue, margin_pct references both.

    - id:        "add_financials"
      namespace: "simulation"
      type:      "AddDerivedColumns"
      requires:  ["join_with_regions"]
      config:
          input:
              dataset: "simulation/joined/full"
              source:  *local
          output:
              dataset:     "simulation/enriched/financial"
              format:      "parquet"
              description: "Full dataset with revenue, gross_profit and margin_pct"
              source:      *local
          columns:
              - name: "revenue"
                expr: "quantity * unit_price * (1 - discount)"
              - name: "gross_profit"
                expr: "revenue - quantity * cost"
              - name: "margin_pct"
                expr: "gross_profit / revenue * 100"
      resources:
          coin: 1

    # ── PHASE 5: PARALLEL ANALYSIS (5-way fan-out) ──────────────────────────
    # All five tasks read the same enriched dataset independently.

    - id:        "agg_by_region"
      namespace: "simulation"
      type:      "AggregateDataset"
      requires:  ["add_financials"]
      config:
          input:
              dataset: "simulation/enriched/financial"
              source:  *local
          output:
              dataset:     "simulation/agg/by_region"
              format:      "parquet"
              description: "Revenue, profit and quantity aggregated by geographic zone"
              source:      *local
          group_by: ["zone"]
          agg:
              revenue:      "sum"
              gross_profit: "sum"
              quantity:     "sum"
      resources:
          coin: 1

    - id:        "agg_by_category"
      namespace: "simulation"
      type:      "AggregateDataset"
      requires:  ["add_financials"]
      config:
          input:
              dataset: "simulation/enriched/financial"
              source:  *local
          output:
              dataset:     "simulation/agg/by_category"
              format:      "parquet"
              description: "Revenue and quantity aggregated by product category"
              source:      *local
          group_by: ["category"]
          agg:
              revenue:  "sum"
              quantity: "sum"
      resources:
          coin: 1

    - id:        "agg_by_segment"
      namespace: "simulation"
      type:      "AggregateDataset"
      requires:  ["add_financials"]
      config:
          input:
              dataset: "simulation/enriched/financial"
              source:  *local
          output:
              dataset:     "simulation/agg/by_segment"
              format:      "parquet"
              description: "Revenue and profit aggregated by customer segment"
              source:      *local
          group_by: ["segment"]
          agg:
              revenue:      "sum"
              gross_profit: "sum"
      resources:
          coin: 1

    - id:        "pivot_cat_zone"
      namespace: "simulation"
      type:      "PivotDataset"
      requires:  ["add_financials"]
      config:
          input:
              dataset: "simulation/enriched/financial"
              source:  *local
          output:
              dataset:     "simulation/pivot/category_by_zone"
              format:      "parquet"
              description: "Revenue matrix: rows=zone, columns=product category"
              source:      *local
          index:   "zone"
          columns: "category"
          values:  "revenue"
          aggfunc: "sum"
      resources:
          coin: 1

    - id:        "filter_high_value"
      namespace: "simulation"
      type:      "FilterDataset"
      requires:  ["add_financials"]
      config:
          input:
              dataset: "simulation/enriched/financial"
              source:  *local
          output:
              dataset:     "simulation/filtered/high_value"
              format:      "parquet"
              description: "Transactions with revenue > 5000"
              source:      *local
          where: "revenue > 5000"
      resources:
          coin: 1

    # ── PHASE 6: REFINEMENT (3 tasks) ───────────────────────────────────────

    - id:        "filter_top_regions"
      namespace: "simulation"
      type:      "FilterDataset"
      requires:  ["agg_by_region"]
      config:
          input:
              dataset: "simulation/agg/by_region"
              source:  *local
          output:
              dataset:     "simulation/report/top_regions"
              format:      "parquet"
              description: "Zones with total revenue > 50000"
              source:      *local
          where: "revenue > 50000"
      resources:
          coin: 1

    - id:        "filter_top_categories"
      namespace: "simulation"
      type:      "FilterDataset"
      requires:  ["agg_by_category"]
      config:
          input:
              dataset: "simulation/agg/by_category"
              source:  *local
          output:
              dataset:     "simulation/report/top_categories"
              format:      "parquet"
              description: "Categories with total revenue > 100000"
              source:      *local
          where: "revenue > 100000"
      resources:
          coin: 1

    - id:        "dedup_top_products"
      namespace: "simulation"
      type:      "DeduplicateDataset"
      requires:  ["filter_high_value"]
      config:
          input:
              dataset: "simulation/filtered/high_value"
              source:  *local
          output:
              dataset:     "simulation/report/top_products"
              format:      "parquet"
              description: "One representative high-value transaction per product_id"
              source:      *local
          subset: ["product_id"]
          keep:   "first"
      resources:
          coin: 1

    # ── PHASE 7: EXECUTIVE REPORT (terminal task) ────────────────────────────
    # Fan-in: merges all 5 report outputs with source_label column for traceability.

    - id:        "merge_executive_report"
      namespace: "simulation"
      type:      "MergeDatasets"
      requires:  ["filter_top_regions", "filter_top_categories", "agg_by_segment",
                  "pivot_cat_zone", "dedup_top_products"]
      config:
          inputs:
              - dataset: "simulation/report/top_regions"
                source:  *local
                label:   "top_regions"
              - dataset: "simulation/report/top_categories"
                source:  *local
                label:   "top_categories"
              - dataset: "simulation/agg/by_segment"
                source:  *local
                label:   "by_segment"
              - dataset: "simulation/pivot/category_by_zone"
                source:  *local
                label:   "pivot_matrix"
              - dataset: "simulation/report/top_products"
                source:  *local
                label:   "top_products"
          output:
              dataset:     "simulation/report/executive"
              format:      "parquet"
              description: "Executive summary — consolidated KPI view across all dimensions"
              source:      *local
      resources:
          coin: 1
