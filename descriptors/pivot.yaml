q.sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: Job
metadata:
    workdir: "work"
spec:
    name: "PivotMetricsByCategory"
    id:   "test_pivot"
    namespace: "analytics"
    type: "PivotDataset"
    params:
        date: "2026-05-15"
    config:
        input:
            dataset: "analytics/erp/clean/clean_erp"
            source:  *local
        output:
            dataset:     "analytics/erp/pivot/metrics_by_category"
            format:      "parquet"
            description: "ERP metrics pivoted — rows=category, cols=metric"
            source:      *local
        index:   "category"
        columns: "metric"
        values:  "value"
        aggfunc: "sum"
    resources:
        coin: 1
    affinity:
        - python
