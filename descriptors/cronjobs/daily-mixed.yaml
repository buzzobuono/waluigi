kind: CronJob
metadata:
  name: "daily-mixed"
  namespace: "analytics"
spec:
  schedule: "*/15 * * * *"
  timezone: "Europe/Rome"
  enabled: true
  executionPolicy: Ephemeral
  concurrencyPolicy: Replace
  params:
    date: "%Y-%m-%dT%H:%M:%S"
  attributes:
    attribute1: "valute_attribute_1"
  jobRef:
    name: "erp-analytics-mixed"
