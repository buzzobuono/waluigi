kind: Job
metadata:
    workdir: "work"
spec:
    name: "AddDerivedMetrics"
    id:   "test_derived"
    namespace: "analytics"
    type: "AddDerivedColumns"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        input:
            dataset: "analytics/erp/clean/clean_erp"
        output:
            dataset:     "analytics/erp/enriched/with_derived"
            format:      "parquet"
            description: "ERP with value_k (thousands) and value_pct"
        columns:
            - name: "value_k"
              expr: "value / 1000"
            - name: "value_pct"         # references value_k computed above
              expr: "value_k / 10"
    resources:
        coin: 1
    affinity:
        - python
