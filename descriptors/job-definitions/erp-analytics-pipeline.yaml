x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: JobDefinition
metadata:
    name: "erp-analytics-pipeline"
    namespace: "analytics"
spec:
    tasks:
        - id: "filter_high_value"
          taskRef:
              name: "FilterDataset"
          config:
              input:
                  dataset: "analytics/erp/clean/clean_erp"
                  source:  *local
              output:
                  dataset:     "analytics/erp/filtered/high_value"
                  format:      "parquet"
                  description: "ERP metrics with value > 1000"
                  source:      *local
              where: "value > 1000"
          resources:
              coin: 1

        - id: "add_derived"
          taskRef:
              name: "AddDerivedColumns"
          requires:
              - "filter_high_value"
          config:
              input:
                  dataset: "analytics/erp/filtered/high_value"
                  source:  *local
              output:
                  dataset:     "analytics/erp/enriched/high_value_with_derived"
                  format:      "parquet"
                  description: "Filtered ERP with value_k and value_pct"
                  source:      *local
              columns:
                  - name: "value_k"
                    expr: "value / 1000"
                  - name: "value_pct"
                    expr: "value_k / 10"
          resources:
              coin: 1

        - id: "aggregate_by_category"
          taskRef:
              name: "AggregateDataset"
          requires:
              - "add_derived"
          config:
              input:
                  dataset: "analytics/erp/enriched/high_value_with_derived"
                  source:  *local
              output:
                  dataset:     "analytics/erp/aggregated/high_value_by_category"
                  format:      "parquet"
                  description: "High-value ERP summed by category"
                  source:      *local
              group_by:
                  - "category"
              agg:
                  value_k: "sum"
          resources:
              coin: 1
