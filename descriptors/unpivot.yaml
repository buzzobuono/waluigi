kind: Job
metadata:
    workdir: "work"
spec:
    name: "UnpivotMetrics"
    id:   "test_unpivot"
    namespace: "analytics"
    type: "PivotDataset"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        input:
            dataset: "analytics/erp/pivot/metrics_by_category"
        output:
            dataset:     "analytics/erp/pivot/metrics_unpivoted"
            format:      "parquet"
            description: "ERP pivot table melted back to long form"
        mode:       "unpivot"
        id_vars:    ["category"]
        var_name:   "metric"
        value_name: "value"
    resources:
        coin: 1
    affinity:
        - python