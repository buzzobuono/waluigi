x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: DAG
metadata:
spec:
    id:   "test_unpivot"
    namespace: "analytics"
    type: "PivotDataset"
    params:
        date: "2026-05-15"
    config:
        input:
            dataset: "analytics/erp/pivot/metrics_by_category"
            source:  *local
        output:
            dataset:     "analytics/erp/pivot/metrics_unpivoted"
            format:      "parquet"
            description: "ERP pivot table melted back to long form"
            source:      *local
        mode:       "unpivot"
        id_vars:    ["category"]
        var_name:   "metric"
        value_name: "value"
    resources:
        coin: 1
    affinity:
        - python
