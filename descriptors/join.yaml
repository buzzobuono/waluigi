q.sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: DAG
metadata:
    workdir: "work"
spec:
    name: "JoinErpWeb"
    id:   "join_erp_web"
    namespace: "analytics"
    type: "JoinDatasets"
    params:
        date: "2026-05-17"
    config:
        left:
            dataset: "analytics/erp/clean/clean_erp"
            source:  *local
        right:
            dataset: "analytics/web/clean/clean_web"
            source:  *local
        join:
            columns:  ["date", "metric"]
            how:      "outer"
            suffixes: ["_erp", "_web"]
        output:
            dataset:     "analytics/joined/erp_web"
            format:      "parquet"
            description: "ERP + WEB join on date and metric"
            source:      *local
    resources:
        coin: 1
    affinity:
        - python
