kind: Job
metadata:
    workdir: "work"
spec:
    name: "JoinErpWeb"
    id:   "join_erp_web"
    namespace: "analytics"
    type: "JoinDatasets"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        left:
            dataset: "analytics/erp/clean/clean_erp"
        right:
            dataset: "analytics/web/clean/clean_web"
        join:
            columns:  "date"
            how:      "inner"
            suffixes: ["_erp", "_web"]
        output:
            dataset:     "analytics/joined/erp_web"
            format:      "parquet"
            description: "ERP + WEB join on date"
    resources:
        coin: 1
    affinity:
        - python
