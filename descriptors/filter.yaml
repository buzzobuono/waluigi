x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: DAG
metadata:
spec:
    id:   "test_filter"
    namespace: "analytics"
    type: "FilterDataset"
    params:
        date: "2026-05-15"
    config:
        input:
            dataset: "analytics/erp/clean/clean_erp"
            source:  *local
        output:
            dataset:     "analytics/erp/filtered/high_value"
            format:      "parquet"
            description: "ERP metrics with value > 1000"
            source:      *local
        where: "value > 1000"
    resources:
        coin: 1
    affinity:
        - python
