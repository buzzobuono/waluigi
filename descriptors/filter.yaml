kind: Job
metadata:
    workdir: "work"
spec:
    name: "FilterHighValue"
    id:   "test_filter"
    namespace: "analytics"
    type: "FilterDataset"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        input:
            dataset: "analytics/erp/clean/clean_erp"
        output:
            dataset:     "analytics/erp/filtered/high_value"
            format:      "parquet"
            description: "ERP metrics with value > 1000"
        where: "value > 1000"
    resources:
        coin: 1
    affinity:
        - python
