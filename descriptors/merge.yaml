kind: Job
metadata:
    workdir: "work"
spec:
    name: "MergeAllSources"
    id:   "merge_all_sources"
    namespace: "analytics"
    type: "MergeDatasets"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        inputs:
            - dataset: "analytics/erp/clean/clean_erp"
              label:   "erp"
            - dataset: "analytics/web/clean/clean_web"
              label:   "web"
            - dataset: "analytics/social/clean/clean_social"
              label:   "social"
        output:
            dataset:     "analytics/merged/all_sources"
            format:      "parquet"
            description: "Merge verticale di ERP, WEB e SOCIAL"
    resources:
        coin: 1
    affinity:
        - python
