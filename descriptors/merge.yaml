q.sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: DAG
metadata:
    workdir: "work"
spec:
    name: "MergeAllSources"
    id:   "merge_all_sources"
    namespace: "analytics"
    type: "MergeDatasets"
    params:
        date: "2026-05-15"
    config:
        inputs:
            - dataset: "analytics/erp/clean/clean_erp"
              label:   "erp"
              source:  *local
            - dataset: "analytics/web/clean/clean_web"
              label:   "web"
              source:  *local
            - dataset: "analytics/social/clean/clean_social"
              label:   "social"
              source:  *local
        output:
            dataset:     "analytics/merged/all_sources"
            format:      "parquet"
            description: "Merge verticale di ERP, WEB e SOCIAL"
            source:      *local
    resources:
        coin: 1
    affinity:
        - python
