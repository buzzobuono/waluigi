kind: Job
metadata:
  module: "test.test2"
  sourcedir: "source"
  workdir: "/data/data/com.termux/files/home/waluigi/work3"
spec:
  - name: "GlobalReport"
    namespace: "analytics"
    command: "echo python -m analytics.report_generator"
    params:
      date: "2026-03-17"
    attributes:
      var: "pippo"
    resources:
      coin: 1
    affinity:
      - python
    requires:
      - name: "CleanDataTask"
        namespace: "analytics"
        id: "clean_erp"
        command: "echo python -m analytics.cleaner"
        params:
          source: "ERP"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.0"
        resources:
          pdc: 1
        affinity:
          - python
        requires:
          - name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_erp"
            command: "echo python -m analytics.extractor"
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python
      - name: "CleanDataTask"
        namespace: "analytics"
        id: "clean_web"
        command: "echo python -m analytics.cleaner"
        params:
          source: "WEB"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.1"
        resources:
          coin: 1
        affinity:
          - python
        requires:
          - name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_web"
            command: "echo python -m analytics.extractor"
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python