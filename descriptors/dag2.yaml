kind: Job
metadata:
  sourcedir: "source"
  workdir: "."
spec:
  - name: "GlobalReport"
    id: "final_report"
    namespace: "analytics"
    command: "python source/analytics/global_report.py"
    params:
      date: "2026-03-20"
    attributes:
      var: "pippo"
    resources:
      coin: 1
    affinity:
      - python
    requires:
      - name: "CleanDataTask"
        namespace: "analytics"
        id: "clean_erp"
        command: "python source/analytics/clean_data.py"
        params:
          source: "ERP"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.0"
        resources:
          pdc: 1
        affinity:
          - python
        requires:
          - name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_erp"
            command: "python source/analytics/raw_data_exctact.py"
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python
      - name: "CleanDataTask"
        namespace: "analytics"
        id: "clean_web"
        command: "python source/analytics/clean_data.py"
        params:
          source: "WEB"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.1"
        resources:
          pdc: 1
        affinity:
          - python
        requires:
          - name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_web"
            command: "python source/analytics/raw_data_exctact.py"
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python
      - name: "CleanDataTask"
        namespace: "analytics"
        id: "clean_social"
        command: "python source/analytics/clean_data.py"
        params:
          source: "SOCIAL"
          date: "${parent.params.date}"
        attributes:
          fail_prob: "0.0"
        resources:
          pdc: 1
        affinity:
          - python
        requires:
          - name: "RawDataExtract"
            namespace: "analytics"
            id: "extract_social"
            command: "python source/analytics/raw_data_exctact.py"
            params:
              source: "${parent.params.source}"
              date: "${parent.params.date}"
            resources:
              coin: 1
            affinity:
              - python