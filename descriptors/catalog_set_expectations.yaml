kind: DAG
metadata:
spec:
    id:   "catalog_set_expectations_test"
    namespace: "catalog"
    type: "CatalogSetExpectations"
    config:
        dataset: "tests/test_dataset"
        expectations:
            - rule_id:   "expect_column_values_to_not_be_null"
              inputs:    {x: "this.metric"}
              tolerance: 1.0
            - rule_id:   "expect_column_values_to_not_be_null"
              inputs:    {x: "this.value"}
              tolerance: 1.0
            - rule_id:   "expect_column_values_to_be_between"
              inputs:    {x: "this.value"}
              params:    {min_val: 0, max_val: 1000000}
              tolerance: 1.0
            - rule_id:   "expect_column_values_to_be_of_type"
              inputs:    {x: "this.value"}
              params:    {target_type: "float"}
              tolerance: 1.0
            - rule_id:   "expect_compound_columns_to_be_unique"
              inputs:    {a: "this.source", b: "this.metric"}
              tolerance: 1.0
    resources:
        coin: 1
    affinity:
        - python
