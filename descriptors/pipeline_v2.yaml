x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: Pipeline
metadata:
    name: "erp-analytics-mixed"
    workdir: "work"
spec:
    params:
        date: "2026-05-15"
    tasks:
        - id: "custom_filter_step"
          namespace: "analytics"
          taskSpec:
              kind: Task
              metadata:
                  name: "inline-filter"
              spec:
                  type: "FilterDataset"
                  resources:
                      coin: 1
          config:
              input:
                  dataset: "analytics/erp/clean/clean_erp"
                  source:  *local
              output:
                  dataset:     "analytics/erp/filtered/high_value"
                  format:      "parquet"
              where: "value > 5000"

        - id: "add_derived"
          namespace: "analytics"
          taskRef:
              name: "AddDerivedColumns"
          requires: ["custom_filter_step"]
          config:
              input:
                  dataset: "analytics/erp/filtered/high_value"
                  source:  *local
              output:
                  dataset:     "analytics/erp/enriched/high_value_with_derived"
                  format:      "parquet"
              columns:
                  - name: "value_k"
                    expr: "value / 1000"
          resources:
              coin: 1

        - id: "aggregate_by_category"
          namespace: "analytics"
          taskRef:
              name: "AggregateDataset"
          requires: ["add_derived"]
          config:
              input:
                  dataset: "analytics/erp/enriched/high_value_with_derived"
                  source:  *local
              output:
                  dataset:     "analytics/erp/aggregated/high_value_by_category"
                  format:      "parquet"
              group_by: ["category"]
              agg:
                  value_k: "sum"
          resources:
              coin: 1
