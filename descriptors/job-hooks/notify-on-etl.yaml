kind: JobHook
metadata:
  name: "notify-on-etl-done"
  namespace: "analytics"
spec:
  watch:
    job: "daily-etl"          # Job Definition name (base_name) — matches all runs
    events:
      - success
      - failure
  trigger:
    jobRef:
      name: "send-notification"
    executionPolicy: Ephemeral
    concurrencyPolicy: Allow
    params:
      subject: "ETL ${event.status}: ${event.job_name}"
      body: "Job ${event.job_id} in namespace ${event.namespace} completed with status ${event.status}. Failed tasks: ${event.failed_tasks}"
      status: "${event.status}"
      job_id: "${event.job_id}"
