x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: DAG
metadata:
    workdir: "work"
spec:
    name: "SelectMetricValue"
    id:   "test_select"
    namespace: "analytics"
    type: "SelectColumns"
    params:
        date: "2026-05-15"
    config:
        input:
            dataset: "analytics/erp/clean/clean_erp"
            source:  *local
        output:
            dataset:     "analytics/erp/projected/metric_value"
            format:      "parquet"
            description: "ERP — metric, value, category only"
            source:      *local
        columns: ["metric", "value", "category"]
    resources:
        coin: 1
    affinity:
        - python
