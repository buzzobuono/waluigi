kind: Job
metadata:
    workdir: "work"
spec:
    name: "PivotMetricsByCategory"
    id:   "test_pivot"
    namespace: "analytics"
    type: "PivotDataset"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        input:
            dataset: "analytics/erp/clean/clean_erp"
        output:
            dataset:     "analytics/erp/pivot/metrics_by_category"
            format:      "parquet"
            description: "ERP metrics pivoted — rows=category, cols=metric"
        index:   "category"
        columns: "metric"
        values:  "value"
        aggfunc: "sum"
    resources:
        coin: 1
    affinity:
        - python

---

# Unpivot example: flatten a wide dataset back to long form
kind: Job
metadata:
    workdir: "work"
spec:
    name: "UnpivotMetrics"
    id:   "test_unpivot"
    namespace: "analytics"
    type: "PivotDataset"
    params:
        date: "2026-05-15"
    config:
        catalog_source: "analytics-local"
        input:
            dataset: "analytics/erp/pivot/metrics_by_category"
        output:
            dataset:     "analytics/erp/pivot/metrics_unpivoted"
            format:      "parquet"
            description: "ERP pivot table melted back to long form"
        mode:       "unpivot"
        id_vars:    ["category"]
        var_name:   "metric"
        value_name: "value"
    resources:
        coin: 1
    affinity:
        - python
