x-sources:
    local: &local
        id:          "analytics-local"
        type:        "LOCAL"
        description: "Local storage for analytics pipeline"

kind: DAG
metadata:
spec:
    id:   "test_deduplicate"
    namespace: "analytics"
    type: "DeduplicateDataset"
    params:
        date: "2026-05-15"
    config:
        input:
            dataset: "analytics/erp/clean/clean_erp"
            source:  *local
        output:
            dataset:     "analytics/erp/dedup/unique_metrics"
            format:      "parquet"
            description: "ERP — one row per metric (first occurrence)"
            source:      *local
        subset: ["metric"]
        keep:   "first"
    resources:
        coin: 1
    affinity:
        - python
