- inputs:
    x: this.product
  rule_id: expect_column_values_to_not_be_null
- inputs:
    x: this.quantity
  rule_id: expect_column_values_to_not_be_null
- inputs:
    x: this.revenue
  rule_id: expect_column_values_to_not_be_null
- inputs:
    x: this.quantity
  params:
    max_val: 100
    min_val: 1
  rule_id: expect_column_values_to_be_between
- inputs:
    x: this.revenue
  params:
    max_avg: 5000.0
    min_avg: 10.0
  rule_id: expect_column_mean_to_be_between
- inputs:
    x: this.product
  rule_id: expect_column_values_to_be_unique
- inputs:
    x: this.product
  params:
    pattern: ^PROD_\d{4}$
  rule_id: expect_column_values_to_match_regex
- inputs:
    x: this.category
  params:
    allowed_values:
    - A
    - B
    - C
    - D
    - E
  rule_id: expect_column_values_to_be_in_set
